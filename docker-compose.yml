services:
  # ──────────────────────────────────────────
  # PostgreSQL database
  # ──────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_DATABASE:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # AdonisJS API
  # ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      TZ: UTC
      PORT: 3333
      HOST: 0.0.0.0
      NODE_ENV: development
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY:?APP_KEY is required — run 'node ace generate:key' and add it to .env}
      SESSION_DRIVER: cookie
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_DATABASE: ${DB_DATABASE:-postgres}
    ports:
      - "3333:3333"
    depends_on:
      db:
        condition: service_healthy

  # ──────────────────────────────────────────
  # SvelteKit frontend
  # ──────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: development
      # Expose the API URL to the SvelteKit server-side runtime
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://api:3333}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
